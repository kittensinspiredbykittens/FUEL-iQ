<!DOCTYPE html>
<html>
<head><title>FuelIQ - Login</title></head>
<body style="font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc;">
    <h2>FuelIQ Login</h2>
    <form method="POST">
        <p><label>Email:</label><br><input type="email" name="email" required style="width:100%"></p>
        <p><label>Password:</label><br><input type="password" name="password" required style="width:100%"></p>
        <button type="submit" style="width:100%; padding:10px; background:#28a745; color:white; border:none;">Login</button>
    </form>
    <p>New user? <a href="/register">Register here</a></p>
</body>
</html>
