<!DOCTYPE html>
<html>
<head><title>FuelIQ - Athlete Profile</title></head>
<body style="font-family: sans-serif; max-width: 500px; margin: 50px auto;">
    <h2>Setup Athlete Profile</h2>
    <form method="POST">
        <p><label>Athlete Name:</label><br><input type="text" name="name" required style="width:100%"></p>
        <p><label>Age:</label><br><input type="number" name="age" required style="width:100%"></p>
        <p><label>Sport:</label><br><input type="text" name="sport" placeholder="Soccer, Swimming, etc." style="width:100%"></p>
        <p><label>Training Schedule / Load:</label><br><input type="text" name="training_schedule" placeholder="2 hours daily, morning running" style="width:100%"></p>
        <p><label>Dietary Notes / Allergies:</label><br><textarea name="dietary_notes" style="width:100%"></textarea></p>
        <button type="submit" style="padding:10px 25px; background:#007bff; color:white; border:none;">Save Profile</button>
    </form>
</body>
</html>
