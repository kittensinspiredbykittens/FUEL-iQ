{% extends "base.html" %}
{% block title %}Log in — FuelIQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Fuel<em>IQ</em></div>
    <p class="auth-sub">Sign in to your account</p>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-dark btn-full">Sign in</button>
    </form>
    <p class="auth-footer">No account? <a href="{{ url_for('register') }}">Create one free</a></p>
  </div>
</div>
{% endblock %}
