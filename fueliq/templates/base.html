<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FuelIQ{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; font-size: 15px; line-height: 1.6; }

        /* Nav */
        nav { background: #0f0f0f; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
        .brand { font-size: 18px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -0.4px; }
        .brand em { color: #4ade80; font-style: normal; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a { font-size: 14px; color: #999; text-decoration: none; }
        .nav-links a:hover { color: #fff; }

        /* Flash */
        .flashes { max-width: 880px; margin: 1rem auto 0; padding: 0 1.5rem; }
        .flash { padding: 0.7rem 1rem; border-radius: 8px; font-size: 14px; margin-bottom: 0.5rem; border: 1px solid; }
        .flash.success { background: #f0fdf4; color: #166534; border-color: #86efac; }
        .flash.danger  { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .flash.warning { background: #fefce8; color: #854d0e; border-color: #fde68a; }
        .flash.info    { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }

        /* Layout */
        .container { max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Auth */
        .auth-wrap { min-height: calc(100vh - 56px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 400px; }
        .auth-logo { font-size: 22px; font-weight: 800; margin-bottom: 0.2rem; }
        .auth-logo em { color: #16a34a; font-style: normal; }
        .auth-sub { font-size: 14px; color: #999; margin-bottom: 1.75rem; }
        .auth-footer { font-size: 13px; color: #999; text-align: center; margin-top: 1rem; }
        .auth-footer a { color: #16a34a; text-decoration: none; font-weight: 500; }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 4px; }
        input[type=text], input[type=email], input[type=password], input[type=number], select, textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; font-family: inherit; color: #1a1a1a; background: #fff; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
        textarea { resize: vertical; min-height: 80px; }

        /* Buttons */
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; text-decoration: none; }
        .btn-dark  { background: #0f0f0f; color: #fff; }
        .btn-green { background: #16a34a; color: #fff; }
        .btn-full  { width: 100%; text-align: center; }

        /* Card */
        .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1.5rem; }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 1.25rem; }

        {% block styles %}{% endblock %}
    </style>
</head>
<body>

{% if session.user_id %}
<nav>
    <a href="{{ url_for('dashboard') }}" class="brand">Fuel<em>IQ</em></a>
    <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('profile') }}">Profile</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="{{ url_for('logout') }}">Log out</a>
    </div>
</nav>
{% endif %}

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flashes">
    {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

{% block content %}{% endblock %}
</body>
</html>
