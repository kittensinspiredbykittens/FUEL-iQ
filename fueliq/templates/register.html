{% extends "base.html" %}
{% block title %}Create account — FuelIQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Fuel<em>IQ</em></div>
    <p class="auth-sub">Create a free parent account</p>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="At least 8 characters">
      </div>
      <button type="submit" class="btn btn-dark btn-full">Create account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
